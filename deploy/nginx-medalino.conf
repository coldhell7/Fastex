# Medalino storefront — only responds on domain, not bare IP (default_server stays on pipeline).
# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name medalino.ir www.medalino.ir;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name medalino.ir www.medalino.ir;

    # Paths populated by certbot — after obtaining certs
    ssl_certificate /etc/letsencrypt/live/medalino.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medalino.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/medalino/storefront;
    index index.html;

    # Proxy cache zone for sitemap / robots
    proxy_cache_path /var/cache/nginx/seo levels=1:2 keys_zone=seo_cache:10m max_size=50m inactive=60m;

    location = /sitemap.xml {
        proxy_cache seo_cache;
        proxy_cache_key "$scheme$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;

        proxy_pass http://127.0.0.1:3002/api/seo/sitemap;
        proxy_http_version 1.1;
        proxy_set_header Host admin.medalino.ir;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_cache seo_cache;
        proxy_cache_key "$scheme$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;

        proxy_pass http://127.0.0.1:3002/api/seo/robots;
        proxy_http_version 1.1;
        proxy_set_header Host admin.medalino.ir;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /_astro/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}

# Admin panel (optional subdomain)
server {
    listen 80;
    listen [::]:80;
    server_name admin.medalino.ir;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
